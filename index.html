<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat Familiar Real-Time</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Tu configuración
        const firebaseConfig = {
            apiKey: "AIzaSyALKug8P2-KqgL8xfKj16So4MgRysmGVV4",
            authDomain: "chat-familiar-app.firebaseapp.com",
            projectId: "chat-familiar-app",
            storageBucket: "chat-familiar-app.firebasestorage.app",
            messagingSenderId: "638014957754",
            appId: "1:638014957754:web:c3437cf4310050bfbb7a83"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Lógica de chat
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('msg-input');

        // Escuchar mensajes en tiempo real
        const q = query(collection(db, "mensajes"), orderBy("createdAt"));
        onSnapshot(q, (snapshot) => {
            chatBox.innerHTML = ""; // Limpiar para actualizar
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = `message message-received`;
                div.innerHTML = `${data.texto} <span class="message-time">${data.createdAt?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // Enviar mensaje
        window.enviarMensaje = async () => {
            if(input.value.trim() !== "") {
                await addDoc(collection(db, "mensajes"), {
                    texto: input.value,
                    createdAt: serverTimestamp()
                });
                input.value = "";
            }
        };
    </script>
    <style>
        /* (Mismo CSS que te pasé antes para mantener el diseño) */
        body { font-family: sans-serif; background: #d1d7db; display: flex; justify-content: center; height: 100vh; }
        .app-container { width: 100%; max-width: 600px; background: #efeae2; display: flex; flex-direction: column; }
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; }
        .message { background: white; padding: 10px; margin: 5px; border-radius: 8px; max-width: 80%; }
        .input-area { padding: 10px; display: flex; }
        input { flex: 1; padding: 10px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="messages-container" id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Escribe algo...">
            <button onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>
</body>
</html>
