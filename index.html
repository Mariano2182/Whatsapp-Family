<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Familiar</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json"> <!-- Opcional para PWA -->
</head>
<body>

    <!-- 📱 PANTALLA DE LOGIN -->
    <div id="login-container" class="screen">
        <div class="login-box">
            <h2>Chat Familiar</h2>
            <p>Ingresa tu cuenta para platicar</p>
            <div id="login-error" style="color: red; margin-bottom: 10px; font-size: 0.9em; text-align: center;"></div>
            <input type="text" id="usuario" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()">Ingresar</button>
        </div>
    </div>

    <!-- 📱 PANTALLA: LISTA DE CHATS -->
    <div id="chats-list-view" class="screen hidden">
        <header class="app-header">
            <div class="header-info">
                <h3>Tus Chats</h3>
                <span id="chats-user-info" class="user-badge"></span>
            </div>
            <div class="header-actions">
                <button id="admin-btn" class="icon-btn hidden" onclick="abrirPanelAdmin()" title="Panel de Control">⚙️</button>
                <button class="icon-btn" onclick="abrirModalDM()" title="Nuevo Chat">👤+</button>
                <button id="btn-crear-grupo-view" class="icon-btn hidden" onclick="abrirModalGrupo()" title="Nuevo Grupo">👥+</button>
                <button class="icon-btn logout-btn" onclick="logout()" title="Cerrar Sesión">🚪</button>
            </div>
        </header>
        <div id="lista-chats-items" class="scrollable-content">
            <!-- Los chats se cargarán aquí -->
        </div>
    </div>

    <!-- 📱 PANTALLA: SALA DE CHAT -->
    <div id="chat-room-view" class="screen hidden chat-layout">
        <header class="app-header">
            <button class="icon-btn" onclick="volverAListaChats()">⬅️</button>
            <div class="header-chat-info">
                <h3 id="active-chat-title">Cargando...</h3>
                <span id="active-chat-status"></span>
            </div>
            <button id="btn-agregar-integrante" class="icon-btn hidden" onclick="abrirModalAgregarIntegrante()">➕👥</button>
        </header>

        <div id="chat-box" class="chat-messages scrollable-content">
            <!-- Mensajes -->
        </div>

        <div id="reply-preview-box" class="reply-preview hidden">
            <div class="reply-content">
                <span id="reply-preview-user"></span>
                <p id="reply-preview-text"></p>
            </div>
            <button class="icon-btn" onclick="cancelarRespuesta()">❌</button>
        </div>

        <footer class="chat-input-area">
            <input type="file" id="gallery-input" accept="image/*" class="hidden" onchange="subirFoto(this)">
            <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" onchange="subirFoto(this)">
            
            <button class="attach-btn" onclick="abrirGaleria()">📎</button>
            <button class="attach-btn" onclick="abrirCamara()">📷</button>
            
            <input type="text" id="msg-input" placeholder="Escribe un mensaje..." autocomplete="off">
            <button class="send-btn" onclick="enviarMensaje()">➤</button>
        </footer>
    </div>

    <!-- 📱 PANTALLA: PANEL DE ADMINISTRADOR -->
    <div id="admin-panel" class="screen hidden">
        <header class="app-header">
            <button class="icon-btn" onclick="volverAlAppDesdeAdmin()">⬅️ Volver</button>
            <h3>Panel de Control</h3>
        </header>
        <div class="scrollable-content admin-content">
            <div class="admin-card">
                <h4>Registrar Nuevo Familiar</h4>
                <div id="admin-reg-msg"></div>
                <input type="text" id="reg-usuario" placeholder="Nombre (ej. tia_marta)">
                <input type="text" id="reg-password" placeholder="Contraseña temporal">
                <select id="reg-rol">
                    <option value="user">Familiar (user)</option>
                    <option value="admin">Administrador (admin)</option>
                </select>
                <button onclick="crearNuevoUsuarioAdmin()">Registrar</button>
            </div>

            <div class="admin-card">
                <h4>Cambiar Nombre de Usuario</h4>
                <div id="admin-msg"></div>
                <input type="text" id="edit-usuario-actual" placeholder="Nombre actual (ej. papa)">
                <input type="text" id="edit-usuario-nuevo" placeholder="Nuevo nombre (ej. papa_carlos)">
                <button onclick="cambiarNombreFamiliar()">Actualizar Nombre</button>
            </div>

            <div class="admin-card">
                <h4>Familiares Registrados</h4>
                <div id="lista-usuarios" class="admin-user-list"></div>
            </div>
        </div>
    </div>

    <!-- 🪟 MODALES FLOTANTES -->
    <!-- Modal: Crear Grupo -->
    <div id="modal-grupo" class="modal hidden">
        <div class="modal-content">
            <h3>Nuevo Grupo Familiar</h3>
            <input type="text" id="group-name-input" placeholder="Nombre del grupo">
            <div id="group-users-list" class="checklist-container"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="cerrarModalGrupo()">Cancelar</button>
                <button onclick="crearGrupoConfirmar()">Crear</button>
            </div>
        </div>
    </div>

    <!-- Modal: Nuevo Chat Directo -->
    <div id="modal-dm" class="modal hidden">
        <div class="modal-content">
            <h3>Iniciar Chat Privado</h3>
            <div id="dm-users-list" class="checklist-container"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="cerrarModalDM()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Agregar Integrante -->
    <div id="modal-agregar-integrante" class="modal hidden">
        <div class="modal-content">
            <h3>Agregar al grupo</h3>
            <div id="lista-usuarios-agregar" class="checklist-container"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="cerrarModalAgregarIntegrante()">Cancelar</button>
                <button onclick="ejecutarAgregarIntegrantes()">Agregar Seleccionados</button>
            </div>
        </div>
    </div>

    <!-- ⚙️ SCRIPTS -->
    <script type="module" src="app.js"></script>
</body>
</html>
