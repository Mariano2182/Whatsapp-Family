<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Familiar</title>
    <link rel="manifest" href="manifest.json"> <!-- Opcional si tienes tu manifest -->
    <style>
        :root {
            --bg-body: #d1d7db;
            --bg-chat: #efeae2;
            --primary-color: #00a884;
            --msg-sent: #d9fdd3;
            --msg-received: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-body); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .app-container { width: 100%; max-width: 600px; height: 100vh; background-color: var(--bg-chat); display: flex; flex-direction: column; position: relative; }
        
        /* Pantalla de Login */
        #login-screen { position: absolute; top:0; left:0; width: 100%; height: 100%; background: #f0f2f5; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .login-box button { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .error-msg { color: red; font-size: 14px; margin-bottom: 10px; min-height: 20px; }

        /* Pantalla de Chat */
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        .chat-header { background: #f0f2f5; padding: 15px; font-weight: bold; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .message { max-width: 75%; padding: 8px 12px; margin-bottom: 10px; border-radius: 8px; font-size: 0.95rem; line-height: 1.4; }
        .message-received { background-color: var(--msg-received); align-self: flex-start; border-top-left-radius: 0; }
        .message-sent { background-color: var(--msg-sent); align-self: flex-end; border-top-right-radius: 0; }
        .message-sender { font-size: 0.75rem; font-weight: bold; color: #075e54; margin-bottom: 3px; display: block; }
        .input-area { height: 60px; background-color: #f0f2f5; display: flex; align-items: center; padding: 10px; }
        .input-area input { flex: 1; height: 40px; border-radius: 20px; border: none; padding: 0 15px; margin-right: 10px; outline: none; font-size: 16px; }
        .input-area button { background-color: var(--primary-color); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- PANTALLA LOGIN -->
        <div id="login-screen">
            <div class="login-box">
                <h2 style="color: #00a884; margin-bottom: 10px;">Chat Familiar</h2>
                <p style="margin-bottom: 20px; font-size: 14px; color: #666;">Ingresa tu cuenta para platicar</p>
                <div id="error-msg" class="error-msg"></div>
                <input type="text" id="username" placeholder="Usuario (ej. marian)">
                <input type="password" id="password" placeholder="Contraseña">
                <button id="btn-login">Ingresar</button>
            </div>
        </div>

        <!-- PANTALLA CHAT -->
        <div id="chat-screen">
            <div class="chat-header">
                <span>Chat Familiar</span>
                <span id="user-display" style="color: #00a884;"></span>
            </div>
            <div class="messages-container" id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Escribe un mensaje...">
                <button id="btn-send">➤</button>
            </div>
        </div>
    </div>

    <!-- Limpieza de Service Worker y Carga de App -->
    <script>
        // Eliminamos SW viejos problemáticos e instalamos el nuevo y limpio
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
                for (let reg of regs) {
                    // Si el SW no es el nuestro, lo borramos (ideal para limpiar OneSignal)
                    if(!reg.active || !reg.active.scriptURL.includes('sw.js')) {
                        reg.unregister();
                    }
                }
            });
            navigator.serviceWorker.register('./sw.js?v=4').then(() => console.log("SW Registrado")).catch(e => console.error(e));
        }
    </script>
    <script type="module" src="./app.js"></script>
</body>
</html>
