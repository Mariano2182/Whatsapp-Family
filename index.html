<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Familiar</title>
    <style>
        :root {
            --bg-body: #d1d7db;
            --bg-app: #ffffff;
            --bg-sidebar: #f0f2f5;
            --bg-chat: #efeae2;
            --primary-color: #00a884;
            --msg-sent: #d9fdd3;
            --msg-received: #ffffff;
            --text-main: #111b21;
            --text-muted: #667781;
            --border-color: #e9edef;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            background-color: var(--bg-app);
            box-shadow: 0 1px 1px 0 rgba(0,0,0,0.06), 0 2px 5px 0 rgba(0,0,0,0.2);
        }

        @media (min-width: 1440px) {
            .app-container {
                height: 95vh;
                margin-top: 2.5vh;
            }
        }

        /* SIDEBAR (Lista de contactos) */
        .sidebar {
            width: 30%;
            min-width: 300px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background-color: #fff;
        }

        .header {
            height: 60px;
            background-color: var(--bg-sidebar);
            display: flex;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: #ccc;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .contact-list {
            overflow-y: auto;
            flex: 1;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--bg-sidebar);
            transition: background-color 0.2s;
        }

        .contact-item:hover {
            background-color: var(--bg-sidebar);
        }

        .contact-item.active {
            background-color: var(--bg-sidebar);
        }

        .contact-info {
            margin-left: 15px;
            flex: 1;
        }

        .contact-name {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 3px;
        }

        .contact-last-msg {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* CHAT AREA (Área de mensajes) */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-chat);
            position: relative;
        }

        .chat-area::before {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            opacity: 0.06;
            z-index: 0;
        }

        .chat-header {
            height: 60px;
            background-color: var(--bg-sidebar);
            display: flex;
            align-items: center;
            padding: 10px 16px;
            z-index: 1;
        }

        .chat-header-info {
            margin-left: 15px;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .message {
            max-width: 65%;
            padding: 8px 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 0.95rem;
            position: relative;
            line-height: 1.4;
            color: var(--text-main);
            word-wrap: break-word;
        }

        .message-received {
            background-color: var(--msg-received);
            align-self: flex-start;
            border-top-left-radius: 0;
            box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
        }

        .message-sent {
            background-color: var(--msg-sent);
            align-self: flex-end;
            border-top-right-radius: 0;
            box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
        }

        .message-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            float: right;
            margin: 10px 0 -5px 15px;
        }

        .input-area {
            height: 62px;
            background-color: var(--bg-sidebar);
            display: flex;
            align-items: center;
            padding: 10px 16px;
            z-index: 1;
        }

        .message-input {
            flex: 1;
            height: 40px;
            border-radius: 8px;
            border: none;
            padding: 9px 12px;
            font-size: 0.95rem;
            outline: none;
            background-color: #fff;
            margin-right: 10px;
        }

        .send-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
        }

        .send-btn:hover {
            background-color: #008f6f;
        }

        /* Responsividad básica para móviles */
        @media (max-width: 768px) {
            .sidebar {
                display: none; /* En una app real, aquí habría lógica para cambiar entre vistas */
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="sidebar">
            <div class="header">
                <div class="avatar" style="background-color: #3498db;">Tú</div>
            </div>
            
            <div class="contact-list">
                <div class="contact-item active">
                    <div class="avatar" style="background-color: #e74c3c;">E</div>
                    <div class="contact-info">
                        <div class="contact-name">Mi Esposa ❤️</div>
                        <div class="contact-last-msg">No olvides comprar el pan.</div>
                    </div>
                </div>
                
                <div class="contact-item">
                    <div class="avatar" style="background-color: #2ecc71;">H</div>
                    <div class="contact-info">
                        <div class="contact-name">Hijos</div>
                        <div class="contact-last-msg">¡Hola papá!</div>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="avatar" style="background-color: #f39c12;">G</div>
                    <div class="contact-info">
                        <div class="contact-name">Grupo Familiar</div>
                        <div class="contact-last-msg">Tía Marta: ¡Feliz domingo a todos!</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div class="avatar" style="background-color: #e74c3c;">E</div>
                <div class="chat-header-info">
                    <div class="contact-name">Mi Esposa ❤️</div>
                    <div class="contact-last-msg" style="color: var(--text-muted); font-size: 0.85rem;">en línea</div>
                </div>
            </div>

            <div class="messages-container" id="chat-box">
                <div class="message message-received">
                    Hola amor, ¿a qué hora llegas a casa?
                    <span class="message-time">18:30</span>
                </div>
                
                <div class="message message-sent">
                    Salgo en 15 minutos. ¡Nos vemos pronto!
                    <span class="message-time">18:32</span>
                </div>

                <div class="message message-received">
                    Perfecto. No olvides comprar el pan.
                    <span class="message-time">18:33</span>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="msg-input" class="message-input" placeholder="Escribe un mensaje aquí..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>

    </div>

    <script>
        function sendMessage() {
            const inputField = document.getElementById('msg-input');
            const messageText = inputField.value.trim();
            
            if (messageText !== "") {
                const chatBox = document.getElementById('chat-box');
                
                // Obtener hora actual
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const timeString = `${hours}:${minutes}`;

                // Crear elemento de mensaje
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message message-sent';
                msgDiv.innerHTML = `${messageText} <span class="message-time">${timeString}</span>`;
                
                // Añadir al chat
                chatBox.appendChild(msgDiv);
                
                // Limpiar input y hacer scroll hacia abajo
                inputField.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // Permitir enviar con la tecla Enter
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
