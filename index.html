<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Familiar</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="login-container" class="login-container">
        <h2>Chat Familiar</h2>
        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
        <p id="error" style="color: red; font-weight: bold; margin-top: 10px;"></p>
        <p id="setup-msg" style="color: #00a884; font-weight: bold; font-size: 0.9em; margin-top: 10px;"></p>
    </div>

    <div id="app" class="hidden">
        <h1>Bienvenido 👋</h1>
        <p id="user-info"></p>
        
        <button id="admin-btn" class="hidden" onclick="abrirPanelAdmin()" style="background-color: #00a884; margin-bottom: 10px;">⚙️ Panel de Superadmin</button>
        
        <button onclick="logout()">Cerrar sesión</button>
    </div>

    <div id="admin-panel" class="hidden" style="max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; margin-top: 50px;">
        <h2>⚙️ Crear Nuevo Familiar</h2>
        <p style="font-size: 0.9em; color: #555; margin-bottom: 15px;">Registra a un miembro de la familia con sus propias credenciales.</p>

        <input type="text" id="nuevo-usuario" placeholder="Nombre del familiar (ej: mama)" style="display:block; width:100%; margin-bottom: 10px; padding:8px;">
        <input type="password" id="nueva-password" placeholder="Contraseña para él/ella" style="display:block; width:100%; margin-bottom: 10px; padding:8px;">
        
        <label style="font-size: 0.85em; font-weight: bold;">Rango asignado:</label>
        <select id="nuevo-rol" style="display:block; width:100%; margin-bottom: 15px; padding:8px;">
            <option value="usuario">Usuario Común (Solo Chat)</option>
            <option value="admin">Administrador Secundario</option>
            <option value="superadmin">Superadmin (Control Total)</option>
        </select>

        <button onclick="crearFamiliar()" style="background-color: #00a884; width: 100%; margin-bottom: 10px;">Crear Cuenta Familiar</button>
        <button onclick="volverAlApp()" style="background-color: #666; width: 100%;">⬅️ Volver Atrás</button>

        <p id="admin-msg" style="font-weight: bold; margin-top: 15px; text-align: center;"></p>
    </div>

    <script type="module" src="js/app.js"></script>

</body>
</html>
