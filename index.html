<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat Familiar Real-Time</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Tu configuración
        const firebaseConfig = {
            apiKey: "AIzaSyALKug8P2-KqgL8xfKj16So4MgRysmGVV4",
            authDomain: "chat-familiar-app.firebaseapp.com",
            projectId: "chat-familiar-app",
            storageBucket: "chat-familiar-app.firebasestorage.app",
            messagingSenderId: "638014957754",
            appId: "1:638014957754:web:c3437cf4310050bfbb7a83"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Lógica de chat
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('msg-input');

        // Escuchar mensajes en tiempo real
        const q = query(collection(db, "mensajes"), orderBy("createdAt"));
        onSnapshot(q, (snapshot) => {
            chatBox.innerHTML = ""; // Limpiar para actualizar
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = `message message-received`;
                div.innerHTML = `${data.texto} <span class="message-time">${data.createdAt?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // Enviar mensaje
        window.enviarMensaje = async () => {
            if(input.value.trim() !== "") {
                await addDoc(collection(db, "mensajes"), {
                    texto: input.value,
                    createdAt: serverTimestamp()
                });
                input.value = "";
            }
        };
    </script>
    <style>
        :root {
            --bg-body: #d1d7db;
            --bg-app: #ffffff;
            --bg-sidebar: #f0f2f5;
            --bg-chat: #efeae2;
            --primary-color: #00a884;
            --msg-sent: #d9fdd3;
            --msg-received: #ffffff;
            --text-main: #111b21;
            --text-muted: #667781;
            --border-color: #e9edef;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            background-color: var(--bg-app);
            box-shadow: 0 1px 1px 0 rgba(0,0,0,0.06), 0 2px 5px 0 rgba(0,0,0,0.2);
        }

        @media (min-width: 1440px) {
            .app-container {
                height: 95vh;
                margin-top: 2.5vh;
            }
        }

        /* SIDEBAR (Lista de contactos) */
        .sidebar {
            width: 30%;
            min-width: 300px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background-color: #fff;
        }

        .header {
            height: 60px;
            background-color: var(--bg-sidebar);
            display: flex;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: #ccc;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .contact-list {
            overflow-y: auto;
            flex: 1;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--bg-sidebar);
            transition: background-color 0.2s;
        }

        .contact-item:hover {
            background-color: var(--bg-sidebar);
        }

        .contact-item.active {
            background-color: var(--bg-sidebar);
        }

        .contact-info {
            margin-left: 15px;
            flex: 1;
        }

        .contact-name {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 3px;
        }

        .contact-last-msg {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* CHAT AREA (Área de mensajes) */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-chat);
            position: relative;
        }

        .chat-area::before {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            opacity: 0.06;
            z-index: 0;
        }

        .chat-header {
            height: 60px;
            background-color: var(--bg-sidebar);
            display: flex;
            align-items: center;
            padding: 10px 16px;
            z-index: 1;
        }

        .chat-header-info {
            margin-left: 15px;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .message {
            max-width: 65%;
            padding: 8px 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 0.95rem;
            position: relative;
            line-height: 1.4;
            color: var(--text-main);
            word-wrap: break-word;
        }

        .message-received {
            background-color: var(--msg-received);
            align-self: flex-start;
            border-top-left-radius: 0;
            box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
        }

        .message-sent {
            background-color: var(--msg-sent);
            align-self: flex-end;
            border-top-right-radius: 0;
            box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
        }

        .message-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            float: right;
            margin: 10px 0 -5px 15px;
        }

        .input-area {
            height: 62px;
            background-color: var(--bg-sidebar);
            display: flex;
            align-items: center;
            padding: 10px 16px;
            z-index: 1;
        }

        .message-input {
            flex: 1;
            height: 40px;
            border-radius: 8px;
            border: none;
            padding: 9px 12px;
            font-size: 0.95rem;
            outline: none;
            background-color: #fff;
            margin-right: 10px;
        }

        .send-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
        }

        .send-btn:hover {
            background-color: #008f6f;
        }

        /* Responsividad básica para móviles */
        @media (max-width: 768px) {
            .sidebar {
                display: none; /* En una app real, aquí habría lógica para cambiar entre vistas */
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="messages-container" id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Escribe algo...">
            <button onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>
</body>
</html>
