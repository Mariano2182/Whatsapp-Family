<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00a884">

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log("Aplicación lista para instalar"))
          .catch(err => console.log("Error registrando PWA:", err));
      }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Familiar</title>
    
    <style>
        :root {
            --bg-body: #dadbd3;
            --bg-chat: #efeae2;
            --wa-green-dark: #008069;
            --wa-green-light: #00a884;
            --msg-sent: #d9fdd3;
            --msg-received: #ffffff;
            --text-main: #111b21;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }

        body { 
            background-color: var(--bg-body); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
            height: 100vh; 
            background-color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); 
            position: relative;
        }

        @media (min-width: 600px) {
            .container {
                height: 92vh;
                border-radius: 10px;
                overflow: hidden;
            }
        }

        /* Login */
        .login-box { padding: 30px 20px; display: flex; flex-direction: column; justify-content: center; height: 100%; align-items: center; background: #f0f2f5; }
        .login-box h2 { margin-bottom: 10px; color: var(--wa-green-dark); }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; outline: none; font-size: 1rem; }
        .login-box button { width: 100%; padding: 12px; background-color: var(--wa-green-dark); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .error-msg { color: #ea0038; margin-top: 10px; font-weight: bold; }

        /* Estructura Chat */
        .view-layout { display: flex; flex-direction: column; height: 100%; background-color: #ffffff; }
        .app-header { background: var(--wa-green-dark); padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .app-header button { background: transparent; border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* Lista de Chats */
        .chats-scroll-list { flex: 1; overflow-y: auto; }
        .chat-item-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f0f2f5; cursor: pointer; }
        .chat-avatar { width: 45px; height: 45px; border-radius: 50%; background: #e9edef; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; margin-right: 12px; }
        .chat-row-details { flex: 1; display: flex; flex-direction: column; }
        .chat-row-title { font-weight: bold; color: var(--text-main); }
        .chat-row-meta { font-size: 0.8rem; color: #667781; margin-top: 2px; }

        /* Sala de mensajes */
        .chat-interface { background-color: var(--bg-chat); }
        .messages-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { max-width: 75%; padding: 8px 11px; margin-bottom: 8px; border-radius: 8px; font-size: 0.95rem; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-envio { background-color: var(--msg-sent); align-self: flex-end; }
        .msg-recepcion { background-color: var(--msg-received); align-self: flex-start; }
        .msg-meta { font-size: 0.75rem; color: var(--wa-green-dark); font-weight: bold; display: block; margin-bottom: 2px; }
        .msg-time { font-size: 0.65rem; color: #667781; display: block; text-align: right; margin-top: 3px; }

        /* Barra de entrada */
        .input-area { background-color: #f0f2f5; display: flex; align-items: center; padding: 8px 12px; gap: 8px; }
        .message-input { flex: 1; height: 40px; border-radius: 20px; border: none; padding: 0 15px; outline: none; font-size: 0.95rem; }
        .attach-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #54656f; }
        .send-btn { background-color: var(--wa-green-dark); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }

        /* Modales */
        .custom-modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-card { width: 85%; background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .modal-card h3 { color: var(--wa-green-dark); margin-bottom: 12px; }
        .users-checklist-box { max-height: 180px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #eee; padding: 5px; border-radius: 6px; }
        .checklist-item { display: flex; align-items: center; padding: 8px 4px; border-bottom: 1px solid #f9f9f9; }
        .checklist-item input { margin-right: 10px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-btn-cancel { padding: 8px 14px; background: #667781; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .modal-btn-action { padding: 8px 14px; background: var(--wa-green-dark); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Panel de administración */
        .admin-interface { padding: 20px; display: flex; flex-direction: column; height: 100%; overflow-y: auto; background: #f0f2f5; }
        .admin-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid #ccc; }
        .admin-section input { padding: 8px; margin-bottom: 8px; width: 100%; border: 1px solid #ccc; border-radius: 6px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-container" class="login-box">
            <h2>Chat Familiar</h2>
            <p style="color: #667781; margin-bottom: 20px; text-align: center; font-size: 0.9rem;">Ingresa tus credenciales asignadas</p>
            <input type="text" id="usuario" placeholder="Nombre de usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()">Ingresar</button>
            <div id="error" class="error-msg"></div>
        </div>

        <div id="chats-list-view" class="view-layout hidden">
            <div class="app-header">
                <div>
                    <span style="font-weight: bold; font-size: 1.1rem; display: block;">Mensajes</span>
                    <span id="chats-user-info" style="font-size: 0.75rem; color: #c1ece3;">Cargando familiar...</span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button id="admin-btn" style="background: rgba(255,255,255,0.2);" class="hidden" onclick="abrirPanelAdmin()">⚙️ Panel</button>
                    <button onclick="logout()">Salir</button>
                </div>
            </div>
            
            <div style="display: flex; gap: 8px; padding: 10px 16px; background: #f0f2f5; border-bottom: 1px solid #e1e1e1;">
                <button id="btn-crear-grupo-view" class="hidden" onclick="abrirModalGrupo()" style="flex:1; padding: 8px; border: none; border-radius: 15px; background: white; color: #54656f; font-weight: 600; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">👥 Crear Grupo</button>
                <button onclick="abrirModalDM()" style="flex:1; padding: 8px; border: none; border-radius: 15px; background: white; color: #54656f; font-weight: 600; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">💬 Mensaje Privado</button>
            </div>

            <div id="lista-chats-items" class="chats-scroll-list"></div>
        </div>

        <div id="chat-room-view" class="view-layout chat-interface hidden">
            <div class="app-header">
                <div style="display: flex; align-items: center; gap: 10px; width: 100%; justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <button onclick="volverAListaChats()" style="font-size: 1.1rem;">⬅</button>
                        <div>
                            <span id="active-chat-title" style="font-weight: bold; display: block;">Chat</span>
                            <span id="active-chat-status" style="font-size: 0.75rem; color: #c1ece3;">En línea</span>
                        </div>
                    </div>
                    <button id="btn-add-miembro-header" class="hidden" onclick="abrirModalAgregarMiembro()" style="background: rgba(255,255,255,0.25); font-size: 0.8rem; border-radius: 15px;">➕ Añadir</button>
                </div>
            </div>
            
            <div class="messages-container" id="chat-box"></div>

            <div class="input-area">
                <button class="attach-btn" onclick="abrirGaleria()">📎</button>
                <input type="file" id="gallery-input" style="display: none;" onchange="subirFoto(this)" accept="image/*">
                
                <input type="text" id="msg-input" class="message-input" placeholder="Escribe un mensaje...">
                <button class="send-btn" onclick="enviarMensaje()">➤</button>
            </div>
        </div>

        <div id="modal-grupo" class="custom-modal-overlay hidden">
            <div class="modal-card">
                <h3>Nuevo Grupo Familiar</h3>
                <input type="text" id="group-name-input" style="width:100%; padding:8px; margin-bottom:12px; border:1px solid #ccc; border-radius:6px;" placeholder="Nombre del grupo...">
                <div id="group-users-list" class="users-checklist-box"></div>
                <div class="modal-buttons">
                    <button class="modal-btn-cancel" onclick="cerrarModalGrupo()">Cancelar</button>
                    <button class="modal-btn-action" onclick="crearGrupoConfirmar()">Crear</button>
                </div>
            </div>
        </div>

        <div id="modal-dm" class="custom-modal-overlay hidden">
            <div class="modal-card">
                <h3>Iniciar Chat Privado</h3>
                <div id="dm-users-list" class="users-checklist-box"></div>
                <div class="modal-buttons">
                    <button class="modal-btn-cancel" onclick="cerrarModalDM()">Cerrar</button>
                </div>
            </div>
        </div>

        <div id="modal-add-miembro" class="custom-modal-overlay hidden">
            <div class="modal-card">
                <h3>Añadir al Grupo</h3>
                <p style="font-size:0.8rem; color:#667781; margin-bottom:8px;">Selecciona los familiares que deseas incorporar:</p>
                <div id="add-miembro-users-list" class="users-checklist-box"></div>
                <div class="modal-buttons">
                    <button class="modal-btn-cancel" onclick="cerrarModalAgregarMiembro()">Cancelar</button>
                    <button class="modal-btn-action" onclick="confirmarAgregarMiembros()">Confirmar</button>
                </div>
            </div>
        </div>

        <div id="admin-panel" class="admin-interface hidden">
            <button onclick="volverAlAppDesdeAdmin()" style="padding:6px 12px; background:#667781; color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer; align-self:flex-start; margin-bottom:15px;">⬅ Volver</button>
            <h2>Panel Administrativo</h2>
            <div id="lista-usuarios" style="margin-top:10px;"></div>
            
            <div class="admin-section">
                <h3>Registrar Familiar</h3>
                <input type="text" id="reg-usuario" placeholder="Nombre único de usuario">
                <input type="password" id="reg-password" placeholder="Contraseña">
                <select id="reg-rol" style="width:100%; padding:8px; margin-bottom:8px; border:1px solid #ccc; border-radius:6px;">
                    <option value="usuario">Usuario estándar</option>
                    <option value="admin">Admin (Crea grupos)</option>
                    <option value="superadmin">Superadmin</option>
                </select>
                <button onclick="crearNuevoUsuarioAdmin()" style="width:100%; padding:10px; background:var(--wa-green-dark); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">Registrar en la Red</button>
                <div id="admin-reg-msg" style="margin-top:8px; font-weight:bold;"></div>
            </div>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
